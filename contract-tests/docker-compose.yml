services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/testpassword
    ports:
      - "7474:7474"
      - "7687:7687"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  openfga:
    image: openfga/openfga:latest
    command: run
    ports:
      - "8080:8080"
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
