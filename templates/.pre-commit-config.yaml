# Shared pre-commit hooks template for the zeroroot-ai workspace.
# Slice 2.6 of the production-readiness epic (gibson#172 → board #16).
#
# Per-repo .pre-commit-config.yaml copies this verbatim. Drift detector
# (org workflow forthcoming) asserts the file matches the template.

repos:
  # ----- Secret + credential leak prevention --------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  # ----- Large-file + private-key guard -------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: ["--allow-multiple-documents"]

  # ----- Shell scripts ------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # ----- Markdown -----------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: ["--config=.markdownlint.json", "--ignore=node_modules", "--ignore=vendor"]

  # ----- YAML ---------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yml"]
        # The yamllint config file is per-repo; if absent, repo skips.
        # Per slice 2.4, deploy ships a .yamllint.yml with relaxed style.

  # ----- Conventional Commits (commitlint) ----------------------------------
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        # Enforces Conventional Commits subject across ALL commits on
        # feature branches, not just the squash-merged PR title. Catches
        # the trap where release-please sees a non-conformant subject
        # only after merge.
        additional_dependencies: ["@commitlint/config-conventional"]
