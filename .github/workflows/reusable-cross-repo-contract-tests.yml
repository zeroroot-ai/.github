name: Reusable cross-repo contract tests

# Integration safety net for the platform-sdk wholesale flip (PRD .github#101,
# slice .github#114). Checks out platform-sdk and the org .github repo (which
# contains the committed stub contract-test source under contract-tests/),
# runs go mod tidy + go test, and reports one result per service.
#
# Services exercised (one happy-path + one forced-failure per service):
#   PlatformOperatorService / Shutdown
#   TenantAdminService      / ListAgentIdentities
#   UsageService            / ListUsage
#   ModelAccessService      / ListAccess
#   DiscoveryService        / ListAgents
#   DaemonAdminService      / StartComponent
#   AdminTenantService      / GetReservedNames
#
# Testcontainer deps (Neo4j, Redis, OpenFGA, Postgres) are started via
# docker-compose for environment parity; the in-process stub gRPC servers
# do not connect to them in this stub phase.
#
# Calling repo example:
#
#   jobs:
#     contract-tests:
#       uses: zero-day-ai/.github/.github/workflows/reusable-cross-repo-contract-tests.yml@main
#       with:
#         platform-sdk-ref: main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      platform-sdk-ref:
        description: "git ref (branch/tag/SHA) of zero-day-ai/platform-sdk to test against"
        type: string
        required: false
        default: "main"
      daemon-image:
        description: "Fully-qualified daemon image (ghcr.io/zero-day-ai/gibson:tag)."
        type: string
        required: false
        default: "ghcr.io/zero-day-ai/gibson:main"
      tenant-operator-image:
        description: "Fully-qualified tenant-operator image."
        type: string
        required: false
        default: "ghcr.io/zero-day-ai/tenant-operator:main"
      platform-operator-image:
        description: "Fully-qualified platform-operator image."
        type: string
        required: false
        default: "ghcr.io/zero-day-ai/platform-operator:main"
      ext-authz-image:
        description: "Fully-qualified ext-authz image."
        type: string
        required: false
        default: "ghcr.io/zero-day-ai/ext-authz:main"
      runs-on:
        description: "Runner to use"
        type: string
        required: false
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        required: false
        default: 30
    secrets:
      GH_PAT_PLATFORM_RO:
        required: false
        description: |
          Read-only PAT or GitHub App token for checking out private platform
          repos (zero-day-ai/platform-sdk). If the calling repo passes
          secrets: inherit and its GITHUB_TOKEN has org private-repo read
          access, this can be omitted.

permissions:
  contents: read

jobs:
  contract-tests:
    name: contract-tests
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    env:
      GOPRIVATE: "github.com/zero-day-ai/*"
      GONOSUMCHECK: "github.com/zero-day-ai/*"
      DAEMON_IMAGE: ${{ inputs.daemon-image }}
      TENANT_OPERATOR_IMAGE: ${{ inputs.tenant-operator-image }}
      PLATFORM_OPERATOR_IMAGE: ${{ inputs.platform-operator-image }}
      EXT_AUTHZ_IMAGE: ${{ inputs.ext-authz-image }}

    steps:
      - name: Checkout org .github repo
        uses: actions/checkout@v6
        with:
          repository: zero-day-ai/.github
          token: ${{ secrets.GH_PAT_PLATFORM_RO || github.token }}
          path: dot-github

      - name: Checkout platform-sdk
        uses: actions/checkout@v6
        with:
          repository: zero-day-ai/platform-sdk
          ref: ${{ inputs.platform-sdk-ref }}
          token: ${{ secrets.GH_PAT_PLATFORM_RO || github.token }}
          path: platform-sdk

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: platform-sdk/go.mod
          cache: true

      - name: Configure GOPRIVATE access
        env:
          TOKEN: ${{ secrets.GH_PAT_PLATFORM_RO || github.token }}
        run: |
          git config --global \
            url."https://x-access-token:${TOKEN}@github.com/zero-day-ai/".insteadOf \
            "https://github.com/zero-day-ai/"

      - name: Prepare contract-test module
        run: |
          mkdir -p contract-tests
          cp dot-github/contract-tests/go.mod.tmpl  contract-tests/go.mod
          cp dot-github/contract-tests/contract_test.go contract-tests/contract_test.go

      - name: Start dep containers
        run: |
          docker compose -f dot-github/contract-tests/docker-compose.yml up -d
          echo "Dep containers started for environment parity."

      - name: go mod tidy
        working-directory: contract-tests
        run: go mod tidy

      - name: Run contract tests
        working-directory: contract-tests
        run: |
          go test -v -race -timeout 5m ./... 2>&1 | tee /tmp/contract-test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Stop dep containers
        if: always()
        run: docker compose -f dot-github/contract-tests/docker-compose.yml down --remove-orphans || true

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-output
          path: /tmp/contract-test-output.txt
          retention-days: 7
