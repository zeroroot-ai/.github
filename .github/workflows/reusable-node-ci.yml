name: Reusable Node CI (tiered)

# Canonical three-tier Node/pnpm CI for every Node repo in the workspace.
# Epic: cicd-efficiency (board #44), slice S11a (dashboard#940). See
# docs/architecture/CICD-CONTEXT.md decisions 4/8/11 and docs/adr/0060-*.
# Mirrors reusable-go-ci.yml's tier split 1:1 -- same rationale applies
# (per-push double-firing of the full suite on both `pull_request` and
# `push:main` was the dominant per-repo minute cost).
#
# ONE reusable, called with a `tier` that maps to the caller's trigger:
#
#   pull_request  -> tier: fast   (quick contributor signal: typecheck,
#                                 lint, vitest unit tests. No build.)
#   merge_group   -> tier: heavy  (authoritative gate: `pnpm build`, which
#                                 runs the full `prebuild` policy-guard
#                                 chain -- security-lint, CSP, no-store-
#                                 clients, no-direct-daemon-grpc, the AST
#                                 checks (`test:ast-checks`), knip, and
#                                 every other check wired into the
#                                 `prebuild` npm script -- plus `next build`
#                                 itself and the `postbuild` secret-leak
#                                 guards. `test:ast-checks` is NOT run again
#                                 as a separate step: it is already the
#                                 second-to-last command in `prebuild`, so a
#                                 standalone re-run would just repeat work
#                                 the build already did.)
#
# Callers pin a RELEASE TAG, never @main (ADR-0060 blast-radius):
#   uses: zeroroot-ai/.github/.github/workflows/reusable-node-ci.yml@v2
#
# Sibling-repo-dependent generators (plans.ts, stripe_gen.ts, the authz
# registry, the RBAC helm-template check) cannot run in a single-repo
# checkout -- there is no polyrepo sibling on disk. Callers whose `prebuild`
# chain includes those generators must set `skip-sibling-generators: true`
# so this reusable exports the same SKIP_* env vars the org's Dockerfiles
# already use to trust the committed generated files and defer freshness
# drift-checking to the workstation / a full polyrepo CI run. Scripts that
# already self-degrade to a "structural" check when their sibling is absent
# (mission-schema, cli-reference, templates) need no such flag and keep
# running for real, just in reduced mode.

on:
  workflow_call:
    inputs:
      tier:
        description: "fast (pull_request) | heavy (merge_group)"
        type: string
        required: true
      node-version-file:
        description: "File setup-node reads the Node version from (.nvmrc, .node-version, .tool-versions, package.json)"
        type: string
        required: false
        default: ".tool-versions"
      pnpm-version:
        description: "pnpm major/minor to install via pnpm/action-setup"
        type: string
        required: false
        default: "10"
      working-directory:
        description: "Path to the Node project root (default: repo root)"
        type: string
        required: false
        default: "."
      skip-sibling-generators:
        description: >-
          Export the SKIP_GEN_PLANS / SKIP_PLANS_FRESH_CHECK /
          SKIP_GEN_STRIPE_TIERS / SKIP_STRIPE_TIERS_FRESH_CHECK /
          SKIP_GEN_AUTHZ_REGISTRY / SKIP_AUTHZ_REGISTRY_CHECK /
          SKIP_DASHBOARD_RBAC_CHECK env vars (heavy tier only) so `pnpm
          build` trusts the committed generated files instead of trying to
          read a polyrepo sibling that a single-repo checkout doesn't have.
          Matches the pattern the org's Dockerfiles already use.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  node-ci:
    name: node-ci (${{ inputs.tier }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.tier == 'heavy' && 20 || 10 }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    # Build-time placeholders for modules that validate env vars at import
    # time (mirrors the Dockerfile's build stage). Real values come from
    # K8s secrets at runtime; `pnpm build` never ships these into the image.
    env:
      AUTH_SECRET: build-placeholder
      NEXTAUTH_SECRET: build-placeholder
      DATABASE_URL: postgresql://build:build@localhost:5432/build
      SKIP_GEN_PLANS: ${{ inputs.skip-sibling-generators && '1' || '' }}
      SKIP_PLANS_FRESH_CHECK: ${{ inputs.skip-sibling-generators && '1' || '' }}
      SKIP_GEN_STRIPE_TIERS: ${{ inputs.skip-sibling-generators && '1' || '' }}
      SKIP_STRIPE_TIERS_FRESH_CHECK: ${{ inputs.skip-sibling-generators && '1' || '' }}
      SKIP_GEN_AUTHZ_REGISTRY: ${{ inputs.skip-sibling-generators && '1' || '' }}
      SKIP_AUTHZ_REGISTRY_CHECK: ${{ inputs.skip-sibling-generators && '1' || '' }}
      SKIP_DASHBOARD_RBAC_CHECK: ${{ inputs.skip-sibling-generators && '1' || '' }}
    steps:
      - uses: actions/checkout@v6.0.2 # pin: de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: pnpm/action-setup@v6.0.9 # pin: 0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v6.4.0 # pin: 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: ${{ inputs.working-directory }}/${{ inputs.node-version-file }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # ---- FAST tier (pull_request): quick contributor signal ----
      - name: typecheck
        if: ${{ inputs.tier == 'fast' }}
        run: pnpm typecheck

      - name: lint
        if: ${{ inputs.tier == 'fast' }}
        run: pnpm lint

      - name: unit tests (vitest)
        if: ${{ inputs.tier == 'fast' }}
        run: pnpm test -- --run

      # ---- HEAVY tier (merge_group): authoritative gate before landing ----
      # `pnpm build` = `next build`, gated by the `prebuild` npm hook (every
      # policy-guard script, including `test:ast-checks` and `knip`) and
      # followed by the `postbuild` secret-leak guards. NEVER disable any
      # guard in that chain to make this step pass -- fix the underlying
      # violation instead.
      - name: build (prebuild guard chain + next build + postbuild guards)
        if: ${{ inputs.tier == 'heavy' }}
        run: pnpm build
