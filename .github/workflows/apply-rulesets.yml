# Applies org-level and repo-level rulesets from rulesets/*.json.
#
# Triggers:
#   - push to main on rulesets/**.json or this workflow
#   - workflow_dispatch (manual reapply)
#
# Auth: requires a PAT in secret RULESET_APPLY_TOKEN with org-admin and
# repo-admin perms across all 12 zeroroot-ai/* repos. The default
# GITHUB_TOKEN cannot manage org-level rulesets or cross-repo rulesets.
#
# Plan requirement: GitHub Team for org rulesets, GitHub Pro for branch
# rulesets on private repos. Public repos work on Free plan.
#
# Idempotency: each ruleset JSON file has a `name` field; the script looks
# up an existing ruleset by name before deciding POST vs PUT. Re-running
# the workflow on unchanged files is a no-op.
#
# Error handling: each apply step is wrapped in `set +e` so one repo's
# failure (e.g. API plan-gate) doesn't block the others. Failures are
# tallied and the job exits non-zero only if any apply failed.
#
# Gotcha -- emergency live edits diverge from this directory until the next
# push-triggered run: an emergency `gh api --method PUT
# repos/<org>/<repo>/rulesets/<id>` edit straight against a live ruleset
# (e.g. stripping `required_status_checks` to unblock a frozen merge queue,
# per epic cicd-efficiency board #44) bypasses this workflow entirely, so the
# live ruleset silently drifts from the committed `rulesets/*.json` it was
# generated from. The committed file is NOT touched by that kind of
# emergency edit and may already be correct/unchanged. To force a resync
# once the underlying issue is fixed, land any commit that touches the
# affected `rulesets/*.json` path (even a no-op formatting change, or a
# touch to this workflow file itself, since it's also in the paths filter
# above) on `main` -- the push trigger reapplies every file's current
# committed content via PUT, restoring live state to match source of truth.
# `gh workflow run apply-rulesets.yml -R zeroroot-ai/.github` (manual
# workflow_dispatch) does the same without waiting for a push.

name: apply-rulesets

on:
  push:
    branches: [main]
    paths:
      - 'rulesets/**.json'
      - '.github/workflows/apply-rulesets.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply-org-rulesets:
    name: Apply org-level rulesets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 # pin: de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Apply each org ruleset
        env:
          GH_TOKEN: ${{ secrets.RULESET_APPLY_TOKEN }}
        run: |
          set -uo pipefail
          shopt -s nullglob
          failures=0
          for f in rulesets/org/*.json; do
            name=$(jq -r '.name' "$f")
            echo "::group::Org ruleset: $name (from $f)"
            # List existing rulesets; if the call fails (plan gate, perm), skip lookup.
            list_out=$(gh api /orgs/zeroroot-ai/rulesets 2>&1) || true
            existing_id=""
            if echo "$list_out" | jq -e 'type == "array"' >/dev/null 2>&1; then
              existing_id=$(echo "$list_out" | jq -r ".[] | select(.name == \"$name\") | .id" | head -1)
            else
              echo "::warning::Could not list rulesets (response: $(echo "$list_out" | head -3 | tr '\n' ' '))"
            fi
            if [[ "$existing_id" =~ ^[0-9]+$ ]]; then
              echo "Updating existing ruleset id=$existing_id"
              if ! gh api --method PUT "/orgs/zeroroot-ai/rulesets/$existing_id" --input "$f"; then
                echo "::error::Failed to update org ruleset $name"
                failures=$((failures+1))
              fi
            else
              echo "Creating new ruleset"
              if ! gh api --method POST "/orgs/zeroroot-ai/rulesets" --input "$f"; then
                echo "::error::Failed to create org ruleset $name (likely needs GitHub Team plan)"
                failures=$((failures+1))
              fi
            fi
            echo "::endgroup::"
          done
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures org ruleset(s) failed to apply"
            exit 1
          fi

  apply-repo-rulesets:
    name: Apply repo-level rulesets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 # pin: de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Apply each repo ruleset
        env:
          GH_TOKEN: ${{ secrets.RULESET_APPLY_TOKEN }}
        run: |
          set -uo pipefail
          shopt -s nullglob
          failures=0
          for f in rulesets/repo/*.json; do
            repo=$(basename "$f" .json)
            name=$(jq -r '.name' "$f")
            echo "::group::Repo ruleset: $repo / $name (from $f)"
            list_out=$(gh api "/repos/zeroroot-ai/$repo/rulesets" 2>&1) || true
            existing_id=""
            if echo "$list_out" | jq -e 'type == "array"' >/dev/null 2>&1; then
              existing_id=$(echo "$list_out" | jq -r ".[] | select(.name == \"$name\") | .id" | head -1)
            else
              echo "::warning::Could not list rulesets for $repo (likely needs GitHub Pro for private repos): $(echo "$list_out" | head -3 | tr '\n' ' ')"
            fi
            if [[ "$existing_id" =~ ^[0-9]+$ ]]; then
              echo "Updating existing ruleset id=$existing_id"
              if ! gh api --method PUT "/repos/zeroroot-ai/$repo/rulesets/$existing_id" --input "$f"; then
                echo "::error::Failed to update repo ruleset $repo/$name"
                failures=$((failures+1))
              fi
            else
              echo "Creating new ruleset"
              if ! gh api --method POST "/repos/zeroroot-ai/$repo/rulesets" --input "$f"; then
                echo "::error::Failed to create repo ruleset $repo/$name (likely needs GitHub Pro for private repos)"
                failures=$((failures+1))
              fi
            fi
            echo "::endgroup::"
          done
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures repo ruleset(s) failed to apply"
            exit 1
          fi
