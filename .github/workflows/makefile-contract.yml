name: makefile-contract

# Slice 1.4 of the production-readiness epic (gibson#171 → board #16).
# Asserts every repo's Makefile exposes the contracted targets:
#
#   build / test / check / image (image-producing repos only)
#
# Plus slice-5.1 test targets:
#
#   test-integration / test-e2e (where applicable)
#
# A repo's Makefile that's missing any required target fails this gate.
#
# Exempt repos (no Go service/library — a Makefile build/test/check
# contract does not apply): docs, gitops, deploy (Helm + Terraform
# cluster bootstrap), dashboard (pnpm/TypeScript), the org repo, and the
# pages site.
#
# IMPORTANT — token scope: enumeration uses GH_PAT_PLATFORM_RO so the audit
# can see PRIVATE org repos. With the default GITHUB_TOKEN `gh api
# orgs/.../repos` returns only PUBLIC repos, so the audit silently skips
# every private repo and reports a false "all clear" (this is exactly how
# .github#170 came to list only the single public drift). The job hard-fails
# below if a known private repo is not visible, so the blind spot can never
# silently return.
#
# Runs weekly + on workflow_dispatch + on PR to .github repo (to validate
# updates to this workflow against current repos).

on:
  schedule:
    - cron: "30 11 * * 1"  # Monday 11:30 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/makefile-contract.yml"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Audit each repo
        env:
          # PLATFORM_RO PAT enumerates PRIVATE repos; GITHUB_TOKEN sees only
          # public ones and would make this audit silently incomplete.
          GH_TOKEN: ${{ secrets.GH_PAT_PLATFORM_RO || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Exclude infra/non-Go repos: org repo, docs, gitops, deploy
          # (Helm + Terraform), dashboard (pnpm), and the pages site.
          REPOS=$(gh api orgs/zeroroot-ai/repos --paginate --jq '.[].name' | \
                  grep -vE '^(\.github|docs|gitops|deploy|dashboard|.*\.github\.io)$')

          # Blind-spot guard: if the token cannot see private repos, `gibson`
          # (a known private Go repo) is absent and the audit would be a false
          # all-clear. Fail loudly instead of silently skipping every private
          # repo (the root cause of .github#170 under-reporting).
          if ! printf '%s\n' "$REPOS" | grep -qx 'gibson'; then
            echo "::error::repo enumeration is missing private repos (gibson not visible) — GH_PAT_PLATFORM_RO is unset or lacks org read; audit would be incomplete"
            exit 1
          fi

          MISSING=""
          for REPO in $REPOS; do
            MAKEFILE=$(gh api "/repos/zeroroot-ai/$REPO/contents/Makefile" \
                       --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            if [ -z "$MAKEFILE" ]; then
              MISSING="${MISSING}\n- $REPO: no Makefile"
              continue
            fi
            # Required targets
            FAIL=""
            for T in build test check; do
              if ! echo "$MAKEFILE" | grep -qE "^${T}:"; then
                FAIL="${FAIL} ${T}"
              fi
            done
            if [ -n "$FAIL" ]; then
              MISSING="${MISSING}\n- $REPO: missing target(s):${FAIL}"
            fi
          done

          TITLE="Makefile contract drift — $(date -u +%Y-%m-%d)"
          if [ -z "$MISSING" ]; then
            echo "::notice::all repos pass Makefile contract"
            # Self-heal: close any stale open drift issue so the tracker
            # reflects the now-clean state instead of lingering open.
            CLEAN_EXISTING=$(gh issue list -R zeroroot-ai/.github \
                               --state open --search 'in:title "Makefile contract drift"' \
                               --json number --jq '.[0].number // empty')
            if [ -n "$CLEAN_EXISTING" ]; then
              gh issue close "$CLEAN_EXISTING" -R zeroroot-ai/.github \
                --comment "All repos now satisfy the Makefile contract (build/test/check). Auto-closed by the makefile-contract audit."
            fi
            exit 0
          fi

          BODY="## Makefile contract drift report\n\nPer slice 1.4 every repo's Makefile must expose \`build\`, \`test\`, \`check\` targets.\n\nDrifted repos:${MISSING}\n\nFor the canonical contract, see workspace CLAUDE.md + the production-readiness PRD at gibson#171."

          EXISTING=$(gh issue list -R zeroroot-ai/.github \
                       --state open --search 'in:title "Makefile contract drift"' \
                       --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            printf "%b" "$BODY" | gh issue edit "$EXISTING" -R zeroroot-ai/.github --title "$TITLE" --body-file -
          else
            printf "%b" "$BODY" | gh issue create -R zeroroot-ai/.github --title "$TITLE" --body-file - --label "ready-for-agent"
          fi
