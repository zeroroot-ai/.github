name: Reusable Go CI (tiered)

# Canonical three-tier Go CI for every Go repo in the workspace.
# Epic: cicd-efficiency (board #44), slice S2 (gibson#1128). See
# docs/architecture/CICD-CONTEXT.md and docs/adr/0060-*.
#
# ONE reusable, called with a `tier` that maps to the caller's trigger:
#
#   pull_request  -> tier: fast   (quick contributor signal; no images, no race)
#   merge_group   -> tier: heavy  (authoritative gate; race + coverage + govulncheck)
#
# The old all-in-one reusable-go-check ran every step on every call; splitting
# by tier is what removes the per-push redundancy that dominated the bill.
#
# Callers pin a RELEASE TAG, never @main (ADR-0060 blast-radius):
#   uses: zeroroot-ai/.github/.github/workflows/reusable-go-ci.yml@v2
#
# Private zeroroot-ai modules: set private-modules: true and pass the
# `gh-pat` secret (a read-only PAT with repo scope) so `go mod download`
# can reach private deps. Public repos (sdk/adk/setec/gibson-executor)
# leave private-modules at its default false and pass no secret.

on:
  workflow_call:
    inputs:
      tier:
        description: "fast (pull_request) | heavy (merge_group)"
        type: string
        required: true
      go-mod-path:
        description: "Path to the module root (default: repo root)"
        type: string
        required: false
        default: ""
      build-tags:
        description: "Comma-separated build tags for build/test (e.g. setec_integration)"
        type: string
        required: false
        default: ""
      golangci-config:
        description: "Path to .golangci.yml (default: auto-discover)"
        type: string
        required: false
        default: ""
      skip-lint:
        description: "Skip golangci-lint (repos not yet on the shared lint baseline)"
        type: boolean
        required: false
        default: false
      private-modules:
        description: "Configure git+GOPRIVATE for private zeroroot-ai modules"
        type: boolean
        required: false
        default: false
      vuln-severity:
        description: "Minimum severity to fail govulncheck (heavy tier only)"
        type: string
        required: false
        default: "MEDIUM"
    secrets:
      gh-pat:
        description: "Read-only PAT for private module fetch (required when private-modules: true)"
        required: false

permissions:
  contents: read

jobs:
  go-ci:
    name: go-ci (${{ inputs.tier }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.tier == 'heavy' && 30 || 15 }}
    env:
      # Build tags flow to both build and test so the fast compile-check and the
      # heavy race run exercise the same variant the images ship.
      GOFLAGS: ${{ inputs.build-tags != '' && format('-tags={0}', inputs.build-tags) || '' }}
    steps:
      - uses: actions/checkout@v6.0.2 # pin: de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Private-module auth MUST be configured before setup-go (which may run
      # `go mod download`). GOPRIVATE skips the public proxy/checksum DB.
      - name: Configure private module access
        if: ${{ inputs.private-modules }}
        env:
          GH_PAT: ${{ secrets.gh-pat }}
        run: |
          set -euo pipefail
          if [ -z "${GH_PAT:-}" ]; then
            echo "::error::private-modules: true but the gh-pat secret is empty"; exit 1
          fi
          echo "GOPRIVATE=github.com/zeroroot-ai/*" >> "$GITHUB_ENV"
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v6.4.0 # pin: 4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: ${{ inputs.go-mod-path != '' && format('{0}/go.mod', inputs.go-mod-path) || 'go.mod' }}
          cache: true

      # ---- FAST tier (pull_request): quick signal, no race, no images ----
      - name: go mod tidy + drift check
        if: ${{ inputs.tier == 'fast' }}
        run: |
          set -euo pipefail
          cd "${{ inputs.go-mod-path }}" 2>/dev/null || true
          go mod tidy
          git diff --exit-code go.mod
          test ! -f go.sum || git diff --exit-code go.sum

      - name: go vet
        if: ${{ inputs.tier == 'fast' }}
        run: |
          cd "${{ inputs.go-mod-path }}" 2>/dev/null || true
          go vet ./...

      - name: golangci-lint
        if: ${{ inputs.tier == 'fast' && ! inputs.skip-lint }}
        uses: golangci/golangci-lint-action@v6.5.2 # pin: 55c2c1448f86e01eaae002a5a3a9624417608d84
        with:
          version: v2.0.2
          working-directory: ${{ inputs.go-mod-path }}
          args: --timeout=10m

      - name: go build (compile-check)
        if: ${{ inputs.tier == 'fast' }}
        run: |
          cd "${{ inputs.go-mod-path }}" 2>/dev/null || true
          go build ./...

      - name: go test (unit, no race)
        if: ${{ inputs.tier == 'fast' }}
        run: |
          cd "${{ inputs.go-mod-path }}" 2>/dev/null || true
          go test ./...

      # ---- HEAVY tier (merge_group): authoritative gate before landing ----
      - name: go test (race)
        if: ${{ inputs.tier == 'heavy' }}
        run: |
          cd "${{ inputs.go-mod-path }}" 2>/dev/null || true
          go test -race ./...

      - name: govulncheck
        if: ${{ inputs.tier == 'heavy' }}
        run: |
          set -euo pipefail
          cd "${{ inputs.go-mod-path }}" 2>/dev/null || true
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
