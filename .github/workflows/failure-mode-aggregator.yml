name: failure-mode-aggregator

# Walks every org repo for failure-mode.yaml manifests, validates them
# against schemas/failure-mode.json, and emits a consolidated table to
# docs/agents/failure-modes.md in zero-day-ai/docs.
#
# Slice 6.5 of the production-readiness epic (gibson#176 → board #16).
#
# Runs weekly + manually. Drift detector: regenerated table must match
# the in-tree copy on docs; if not, opens a PR with the update.

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    name: aggregate-failure-modes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2 # pin: de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: zero-day-ai/.github
          path: .github-repo

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml

      - name: Scan for failure-mode.yaml files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/fm
          REPOS=$(gh api orgs/zero-day-ai/repos --paginate --jq '.[].name' | grep -vE '^(\.github|.*\.github\.io)$')
          for REPO in $REPOS; do
            # Use code search to find failure-mode.yaml files quickly
            RESULTS=$(gh api -X GET search/code -F q="filename:failure-mode.yaml repo:zero-day-ai/$REPO" --jq '.items[].path' 2>/dev/null || true)
            for P in $RESULTS; do
              mkdir -p "/tmp/fm/$REPO/$(dirname "$P")"
              gh api "/repos/zero-day-ai/$REPO/contents/$P" --jq '.content' \
                | base64 -d > "/tmp/fm/$REPO/$P" 2>/dev/null || true
            done
          done

      - name: Validate + render table
        run: |
          python3 <<'PY'
          import os, json, glob
          import yaml
          from jsonschema import validate, ValidationError

          schema = json.load(open(".github-repo/schemas/failure-mode.json"))

          entries = []
          for path in glob.glob("/tmp/fm/**/failure-mode.yaml", recursive=True):
              try:
                  doc = yaml.safe_load(open(path))
                  validate(instance=doc, schema=schema)
                  rel = os.path.relpath(path, "/tmp/fm")
                  repo = rel.split("/")[0]
                  entries.append((repo, doc))
              except (yaml.YAMLError, ValidationError) as e:
                  print(f"::warning file={path}::invalid: {e}")

          # Render markdown
          out = "# Failure-mode catalog\n\n"
          out += "Auto-generated by `.github/workflows/failure-mode-aggregator.yml`. DO NOT EDIT BY HAND.\n\n"
          out += f"Found {len(entries)} failure-mode manifests across the org.\n\n"
          out += "| Gate | Symptom | Repo | Diagnostic | Fix | Verify |\n"
          out += "|---|---|---|---|---|---|\n"
          for repo, doc in sorted(entries, key=lambda x: (x[1].get("gate", ""), x[0])):
              gate = doc.get("gate", "?")
              sym = (doc.get("symptom", "")[:60] + "...") if len(doc.get("symptom","")) > 63 else doc.get("symptom","")
              diag = f"`{doc.get('diagnostic_command','')[:40]}`"
              fix = f"`{doc.get('fix_command','')[:40]}`"
              verify = f"`{doc.get('verify_command','')[:40]}`"
              out += f"| {gate} | {sym} | {repo} | {diag} | {fix} | {verify} |\n"

          with open("/tmp/failure-modes.md", "w") as f:
              f.write(out)
          print("rendered", len(entries), "entries to /tmp/failure-modes.md")
          PY

      - name: Upload as artifact
        uses: actions/upload-artifact@v7.0.1 # pin: 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: failure-modes-generated
          path: /tmp/failure-modes.md
          retention-days: 14

      # Note: opening a PR against zero-day-ai/docs to update
      # docs/agents/failure-modes.md is a follow-up (requires a
      # cross-repo PAT with PR-write scope). The artifact is downloadable
      # in the meantime.
