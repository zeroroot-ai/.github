name: Reusable production attestation

# Slice 4.7 of the production-readiness epic (gibson#174 → board #16).
# On every release tag, generates a production-attestation markdown
# report and attaches it to the GitHub release. The report enumerates:
#
#   - Release tag + commit SHA
#   - Open code-scanning alerts by severity (CodeQL findings at time of release)
#   - Trivy CVE findings
#   - Open suppressions (// codeql[ignore] in code)
#   - Verdict: PRODUCTION-READY yes/no
#
# Called from per-repo release-please.yml on tag-push events.

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.2.3)"
        type: string
        required: true
      max_high_severity:
        description: "Max High-severity findings allowed for production-ready=yes"
        type: number
        required: false
        default: 0
      max_medium_severity:
        description: "Max Medium-severity findings allowed for production-ready=yes"
        type: number
        required: false
        default: 5

permissions:
  contents: write       # attach to release
  security-events: read

jobs:
  attest:
    name: production-attestation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate attestation report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          TAG="${{ inputs.release_tag }}"
          SHA="${{ github.sha }}"

          # Code-scanning alert counts by severity
          CRIT=$(gh api "/repos/${REPO}/code-scanning/alerts?state=open&severity=critical" --paginate --jq 'length' 2>/dev/null || echo "0")
          HIGH=$(gh api "/repos/${REPO}/code-scanning/alerts?state=open&severity=high" --paginate --jq 'length' 2>/dev/null || echo "0")
          MED=$(gh api "/repos/${REPO}/code-scanning/alerts?state=open&severity=medium" --paginate --jq 'length' 2>/dev/null || echo "0")

          # Suppression count (grep approximation; true count needs the
          # PRD 3 AST walker for // codeql[ignore] references)
          SUPP=$(grep -rE "// codeql\[ignore\]" --include="*.go" --include="*.ts" --include="*.js" . 2>/dev/null | wc -l || echo "0")

          # Verdict
          MAX_HIGH=${{ inputs.max_high_severity }}
          MAX_MED=${{ inputs.max_medium_severity }}
          VERDICT="YES"
          REASONS=""
          if [ "$CRIT" -gt 0 ]; then VERDICT="NO"; REASONS="${REASONS}\n- $CRIT open critical-severity finding(s)"; fi
          if [ "$HIGH" -gt $MAX_HIGH ]; then VERDICT="NO"; REASONS="${REASONS}\n- $HIGH open high-severity finding(s) > budget $MAX_HIGH"; fi
          if [ "$MED" -gt $MAX_MED ]; then VERDICT="NO"; REASONS="${REASONS}\n- $MED open medium-severity finding(s) > budget $MAX_MED"; fi

          REPORT_FILE="production-attestation-${TAG}.md"
          cat > "${REPORT_FILE}" <<MD
          # Production attestation — ${REPO} ${TAG}

          - Tag: \`${TAG}\`
          - Commit SHA: \`${SHA}\`
          - Generated: $(date -u --iso-8601=seconds)

          ## Code-scanning findings (at release-tag time)

          | Severity | Open count |
          |---|---|
          | Critical | ${CRIT} |
          | High | ${HIGH} |
          | Medium | ${MED} |

          Budget: high ≤ ${MAX_HIGH}, medium ≤ ${MAX_MED}, critical = 0.

          ## Suppressions in code

          \`// codeql[ignore]\` count: ${SUPP}

          Per ADR-0013 + slice 6.8 freshness gates, every suppression must carry a linked issue. The current count is the snapshot at release time; verify each suppression's issue link is still valid.

          ## Verdict

          **PRODUCTION-READY: ${VERDICT}**
          MD

          if [ "$VERDICT" = "NO" ]; then
            echo -e "${REASONS}" >> "${REPORT_FILE}"
          fi

          echo "::notice::production-ready=${VERDICT}"

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            "production-attestation-${{ inputs.release_tag }}.md" \
            --clobber || \
          echo "::warning::release tag ${{ inputs.release_tag }} not found; attestation generated as artifact only"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-attestation-${{ inputs.release_tag }}
          path: production-attestation-${{ inputs.release_tag }}.md
          retention-days: 365
