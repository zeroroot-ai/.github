name: tool-catalog-generator

# Slice 6.4 of the production-readiness epic (gibson#176 → board #16).
# Monthly cron that scans every org repo for tool-emitting artifacts:
#   - AST walker tests (`cmd/*/structural_*_test.go`, `cmd/*/no_*_test.go`)
#   - Linters (golangci-lint configs)
#   - CodeQL queries (qlpack.yml files)
#   - Required CI checks (per-repo ruleset)
#   - Make targets (build / test / check / etc.)
#   - zda-ast subcommands (when the zda-ast CLI lands)
#
# Emits a consolidated docs/agents/tools.md to zeroroot-ai/docs as a
# workflow artifact. PR to actually open the cross-repo PR is a follow-up
# (needs cross-repo PAT).
#
# Cadence pruned weekly→monthly by .github#201 (cicd-efficiency epic,
# board #44) — low-signal maintenance cron, workflow_dispatch still
# available for on-demand runs.

on:
  schedule:
    - cron: "30 12 1 * *" # monthly: 1st of month, 12:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: generate-tool-catalog
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Scan org for tool-emitting artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUT=/tmp/tools.md
          REPOS=$(gh api orgs/zeroroot-ai/repos --paginate --jq '.[].name' | grep -vE '^(\.github|.*\.github\.io)$')

          {
            echo "# Tool catalog"
            echo ""
            echo "Auto-generated by \`.github/workflows/tool-catalog-generator.yml\`. DO NOT EDIT BY HAND."
            echo ""
            echo "Single browsable index of every gate / walker / linter / query / CI check across the workspace. Updated weekly."
            echo ""
            echo "## AST walkers"
            echo ""
            echo "| Repo | Walker test | Purpose |"
            echo "|---|---|---|"
          } > "$OUT"

          for REPO in $REPOS; do
            WALKERS=$(gh api -X GET "search/code" -F q="filename:no_graceful_nil_test.go OR filename:no_context_background_test.go OR filename:no_time_now_test.go OR filename:authz_annotation_completeness_test.go OR filename:check_no_gibson_test.go OR filename:tenant_id_source_test.go OR filename:tenant_client_only_test.go OR filename:audit_emit_on_mutation_test.go repo:zeroroot-ai/$REPO" --jq '.items[].path' 2>/dev/null || true)
            for W in $WALKERS; do
              echo "| $REPO | \`$W\` | structural invariant walker |" >> "$OUT"
            done
          done

          {
            echo ""
            echo "## golangci-lint configs"
            echo ""
            echo "| Repo | Config | |"
            echo "|---|---|---|"
          } >> "$OUT"
          for REPO in $REPOS; do
            CFG=$(gh api "/repos/zeroroot-ai/$REPO/contents/.golangci.yml" --silent 2>/dev/null && echo "yes" || echo "")
            if [ -n "$CFG" ]; then
              echo "| $REPO | \`.golangci.yml\` | extends shared baseline (per slice 2.1) |" >> "$OUT"
            fi
          done

          {
            echo ""
            echo "## CodeQL workflows"
            echo ""
            echo "| Repo | Workflow | |"
            echo "|---|---|---|"
          } >> "$OUT"
          for REPO in $REPOS; do
            CODEQL=$(gh api "/repos/zeroroot-ai/$REPO/contents/.github/workflows/codeql.yml" --silent 2>/dev/null && echo "yes" || echo "")
            if [ -n "$CODEQL" ]; then
              echo "| $REPO | \`.github/workflows/codeql.yml\` | semantic / data-flow analysis (per PRD 4) |" >> "$OUT"
            fi
          done

          {
            echo ""
            echo "## Reusable workflows (org-level, called by per-repo wrappers)"
            echo ""
            echo "| Workflow | Purpose | Slice |"
            echo "|---|---|---|"
            echo "| \`reusable-image-build.yml\` | build + cosign + SLSA + syft SBOM + cosign attest + trivy | 1.1 |"
            echo "| \`reusable-go-check.yml\` | go mod tidy + vet + golangci-lint + race tests + govulncheck | 1.3 |"
            echo "| \`reusable-container-hardening.yml\` | post-build: non-root + no-shell + size budget | 1.6 |"
            echo "| \`reusable-verify-release.yml\` | release-tag verify (cosign sig + SLSA + SBOM + trivy) | 1.7 |"
            echo "| \`reusable-shell-md-lint.yml\` | shellcheck + markdownlint + lychee | 2.5 |"
            echo "| \`reusable-yaml-helm-kubeconform-lint.yml\` | yamllint + helm lint + kubeconform | 2.4 |"
            echo "| \`reusable-test.yml\` | unit + integration + e2e parallel | 5.1 |"
            echo "| \`reusable-production-attestation.yml\` | release-tag attestation report | 4.7 |"
            echo ""
            echo "## Org-level cron workflows"
            echo ""
            echo "| Workflow | Cadence | Purpose | Slice |"
            echo "|---|---|---|---|"
            echo "| \`sarif-triage.yml\` | daily 09:00 UTC | poll code-scanning alerts, file issues on ≥medium | 4.6 |"
            echo "| \`flake-report.yml\` | Monday 10:00 UTC | aggregate flake.json events from past week | 5.11 |"
            echo "| \`per-repo-claude-md-drift.yml\` | Monday 11:00 UTC | scan repos for missing CLAUDE.md / AGENTS.md | 6.3 |"
            echo "| \`makefile-contract.yml\` | Monday 11:30 UTC | audit Makefile contract per repo | 1.4 |"
            echo "| \`failure-mode-aggregator.yml\` | Monday 12:00 UTC | aggregate failure-mode.yaml manifests | 6.5 |"
            echo "| \`tool-catalog-generator.yml\` | Monday 12:30 UTC | regenerate this file | 6.4 |"
            echo "| \`architectural-doc-coverage.yml\` | every PR | Docs-PR trailer check | (existing) |"
            echo "| \`no-monorepo-shortcuts.yml\` | every PR | go.work / replace / .gitmodules deny-list | (existing) |"
            echo "| \`vault-auth-method-deny-list.yml\` | every PR | per ADR-0009 amendment | (existing) |"
            echo "| \`ci-failure-triage.yml\` | every CI failure | auto-open ci-failure issue | (existing) |"
            echo "| \`apply-rulesets.yml\` | manual | apply rulesets/ to all repos | (existing) |"
            echo "| \`mirror-images.yml\` | per tag | mirror images to secondary registry | (existing) |"
            echo ""
            echo "## Templates"
            echo ""
            echo "| Path | Purpose | Slice |"
            echo "|---|---|---|"
            echo "| \`templates/golangci-base.yml\` | shared golangci-lint v2 baseline | 2.1 |"
            echo "| \`templates/.pre-commit-config.yaml\` | uniform pre-commit hooks | 2.6 |"
            echo "| \`templates/commitlint.config.js\` | Conventional Commits config | 2.6 |"
            echo "| \`templates/repo-CLAUDE.md\` | per-repo CLAUDE.md scaffold | 6.3 |"
            echo "| \`templates/dependabot.yml\` | dep-bump config (interim slice 1.5) | 1.5 |"
            echo ""
            echo "## Schemas"
            echo ""
            echo "| Schema | Purpose | Slice |"
            echo "|---|---|---|"
            echo "| \`schemas/failure-mode.json\` | per-gate failure-mode.yaml validation | 6.5 |"
            echo ""
            echo "## Tagged Go modules"
            echo ""
            echo "| Module | Purpose | Latest | Slice |"
            echo "|---|---|---|---|"
            echo "| [\`zeroroot-ai/ast-checks\`](https://github.com/zeroroot-ai/ast-checks) | shared AST walker primitives + harness | v0.1.1 | 3.1 |"
            echo "| [\`zeroroot-ai/testharness\`](https://github.com/zeroroot-ai/testharness) | goldenfile (v0.1) + planned testcontainers | v0.1.0 | 5.13 |"
            echo "| [\`zeroroot-ai/testfixtures\`](https://github.com/zeroroot-ai/testfixtures) | 5 shared fakes (authz/audit/fga/tenant/spiffe) | v0.1.0 | 5.4 |"
          } >> "$OUT"

      - name: Upload as artifact
        uses: actions/upload-artifact@v7.0.1 # pin: 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tool-catalog
          path: /tmp/tools.md
          retention-days: 30
