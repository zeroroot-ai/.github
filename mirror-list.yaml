# Mirror list for ghcr.io/zeroroot-ai/mirror/*.
#
# The mirror-images.yml workflow reads this file and, for each entry,
# copies the upstream image+tag to `ghcr.io/zeroroot-ai/mirror/<dest>:<tag>`.
# Pinned tags are immutable once pushed to the mirror — to update an image,
# add a new entry with a new tag rather than mutating an existing one.
#
# Floating tags (e.g. `golang:1.25-alpine`, `node:20-alpine`, bare `registry:2`,
# distroless `nonroot`) move upstream while keeping the same tag name. The
# default skip-if-exists behaviour would freeze them at the patch they were
# first mirrored as, so such entries MUST set `refresh: true` to be re-copied
# on every run. See .github#175 / #173 (the go1.25.11 GOTOOLCHAIN cascade).
#
# Spec: .spec-workflow/specs/deploy-simplification (Phase 1, R2.3).
#
# Schema:
#   - source:  <registry/repo>    fully-qualified upstream image (no tag)
#     tag:     <tag>              upstream tag to mirror
#     dest:    <name>             local name under ghcr.io/zeroroot-ai/mirror/
#                                 (omit to default to the last path segment of source)
#     refresh: true|false         re-copy on every run instead of skip-if-exists.
#                                 Set true for FLOATING tags (no patch component);
#                                 omit/false for fully-pinned, immutable tags.
#                                 skopeo copy is a no-op when digests match, so
#                                 refreshing is cheap.
mirrors:
  # ---------------------------------------------------------------------------
  # Build & shell base images
  # ---------------------------------------------------------------------------
  - source: docker.io/library/alpine
    tag: "3.21"
    dest: alpine
  - source: docker.io/library/bash
    tag: "5.2"
    dest: bash
  - source: docker.io/library/busybox
    tag: "1.36"
    dest: busybox
  - source: docker.io/library/golang
    tag: "1.25-alpine"     # floating: tracks the latest 1.25.x-alpine patch
    dest: golang
    refresh: true
  - source: docker.io/library/golang
    tag: "1.25.11-alpine"  # pinned patch (go1.25.11 stdlib CVE fixes, .github#173); kept as an explicit floor alongside the refreshing 1.25-alpine
    dest: golang
  - source: docker.io/library/golang
    tag: "1.26.4-alpine"   # gibson go.mod pins go 1.26.4 (govulncheck stdlib fix gibson#612); builders must match (gibson#777)
    dest: golang

  # ---------------------------------------------------------------------------
  # Data plane images
  # ---------------------------------------------------------------------------
  - source: docker.io/library/postgres
    tag: "16.4-alpine"
    dest: postgres
  - source: docker.io/library/redis
    tag: "7.4-alpine"
    dest: redis
  - source: docker.io/library/neo4j
    tag: "5.26.0-community"
    dest: neo4j

  # ---------------------------------------------------------------------------
  # Bitnami refugees (legacy registry; pull-then-mirror until replacements land)
  # ---------------------------------------------------------------------------
  - source: docker.io/bitnamilegacy/kubectl
    tag: "1.31.4"
    dest: kubectl
  # NOTE: bitnamilegacy/kubectl 1.29.x and 1.30.x were removed upstream
  # in 2026-05. The chart now uses :1.31.4 everywhere — see
  # `enterprise/deploy/helm/gibson/templates/{tests,operations}` and
  # spec `deploy-simplification` Phase 1.7. If a future patch requires
  # another kubectl minor, mirror it here AND update the chart together.

  # ---------------------------------------------------------------------------
  # CLI tools used in chart hooks / init containers
  # ---------------------------------------------------------------------------
  - source: docker.io/curlimages/curl
    tag: "8.10.1"
    dest: curl
  - source: ghcr.io/oras-project/oras
    tag: "v1.2.0"
    dest: oras
  - source: docker.io/library/registry
    tag: "2"               # floating: bare major tag tracks latest 2.x
    dest: registry
    refresh: true

  # ---------------------------------------------------------------------------
  # Dockerfile bases for first-party images
  # ---------------------------------------------------------------------------
  - source: docker.io/library/alpine
    tag: "3.20"
    dest: alpine
  - source: docker.io/library/golang
    tag: "1.25"           # floating debian-based; tenant-operator builder needs CGO_ENABLED toggles
    dest: golang
    refresh: true
  - source: docker.io/library/golang
    tag: "1.25.11"        # pinned patch (go1.25.11 stdlib CVE fixes, .github#173); explicit floor alongside the refreshing 1.25
    dest: golang
  - source: docker.io/library/golang
    tag: "1.26.4"         # debian-based; gibson go.mod pins go 1.26.4 (gibson#612); operator builders must match (gibson#777)
    dest: golang
  - source: docker.io/library/node
    tag: "20-alpine"      # floating: tracks the latest 20.x-alpine patch
    dest: node
    refresh: true
  # Python base for the gibson belief-field pgmpy sidecar (gibson#750, deploy#936).
  # The sidecar is a published first-party image, so its base must come from the
  # mirror like every other production image (test fixtures may use docker.io
  # directly; published images may not).
  - source: docker.io/library/python
    tag: "3.12-slim"
    dest: python
  # gcr.io/distroless/* — the Google-published distroless runtime bases.
  # We mirror to ghcr.io so workspace-wide policy holds.
  - source: gcr.io/distroless/static-debian12
    tag: nonroot          # floating: distroless rebuilds nonroot continuously
    dest: distroless-static-debian12
    refresh: true
  - source: gcr.io/distroless/static
    tag: nonroot          # floating: distroless rebuilds nonroot continuously
    dest: distroless-static
    refresh: true

  # ---------------------------------------------------------------------------
  # Chart-side tags the existing helm chart references (Phase 1.7 sweep targets).
  # These can drop after Phase 4 deletes the in-chart subcharts that need them.
  # ---------------------------------------------------------------------------
  - source: docker.io/library/postgres
    tag: "17-alpine"
    dest: postgres
  - source: docker.io/bitnamilegacy/postgresql
    tag: "16.4.0-debian-12-r0"
    dest: bitnami-postgresql
  - source: docker.io/bitnamilegacy/minio
    tag: "2025.7.23-debian-12-r3"
    dest: bitnami-minio
  - source: docker.io/bitnamilegacy/minio-client
    tag: "2025.7.23-debian-12-r2"
    dest: bitnami-minio-client
  - source: docker.io/bitnamilegacy/minio-object-browser
    tag: "2.0.2-debian-12-r3"
    dest: bitnami-minio-object-browser
  # AWS node-termination-handler (used by setec spot-eviction-fallback).
  # Public ECR is a Docker Hub equivalent; pin to a known good tag.
  - source: public.ecr.aws/aws-ec2/aws-node-termination-handler
    tag: "v1.22.0"
    dest: aws-node-termination-handler
